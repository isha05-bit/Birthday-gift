<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#fbc2eb);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(12px);
padding:35px 25px;
border-radius:25px;
text-align:center;
color:white;
box-shadow:0 15px 40px rgba(0,0,0,.2);
animation:pop 1s ease;
z-index:5;
}

@keyframes pop{
0%{transform:scale(.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

h1{
font-size:2.2rem;
text-shadow:0 0 15px white;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 25px gold;}
}

h2{
margin:15px 0;
font-weight:500;
}

p{
margin-top:15px;
line-height:1.6;
font-size:16px;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:50px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:white;
color:#ff4081;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#message{
margin-top:20px;
font-size:18px;
font-weight:bold;
display:none;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* Balloon */

.balloon{
position:absolute;
bottom:-150px;
width:50px;
height:65px;
border-radius:50%;
animation:float linear infinite;
}

.balloon:after{
content:"";
position:absolute;
width:2px;
height:60px;
background:white;
left:24px;
top:60px;
}

@keyframes float{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

/* Responsive */

@media(max-width:500px){
h1{
font-size:1.8rem;
}
p{
font-size:15px;
}
}
</style>

</head>
<body>

<div class="card">
<h1>🎂 Happy Birthday 🎂</h1>

<h2 id="name">Dear Friend ❤️</h2>

<p>
May your day be filled with happiness,
love, laughter, and unforgettable memories.
May all your dreams come true and
this year bring you endless success and joy!
🥳✨
</p>

<button onclick="surprise()">
🎁 Open Surprise
</button>

<div id="message">
🎉 Wishing you a year full of love,
success, good health and endless smiles! 💖
</div>

</div>

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

// Confetti on load

function startConfetti(){

var duration=8000;
var end=Date.now()+duration;

(function frame(){

confetti({
particleCount:5,
angle:60,
spread:55,
origin:{x:0}
});

confetti({
particleCount:5,
angle:120,
spread:55,
origin:{x:1}
});

if(Date.now()<end){
requestAnimationFrame(frame);
}

})();

}

startConfetti();

// Surprise button

function surprise(){

document.getElementById("message").style.display="block";

confetti({
particleCount:300,
spread:180,
origin:{y:.6}
});

}

// Balloons

const colors=[
"#ff4d6d",
"#ffb703",
"#8ecae6",
"#90be6d",
"#c77dff",
"#fb8500",
"#00c2a8"
];

for(let i=0;i<20;i++){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background=colors[Math.floor(Math.random()*colors.length)];

b.style.animationDuration=(6+Math.random()*6)+"s";

b.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(b);

}

</script>

</body>
</html>
